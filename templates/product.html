<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>
    <h1>{{ product.name }}</h1>
    <p>Price: ${{ product.price }}</p>

    <button onclick="trackView()">Track Product View</button>

    <br><br>
    <a href="/">Back to Home</a>

    <script>
        function trackView() {
            fetch("/track", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    event: "view_product",
                    product_id: {{ product.id }},
                    product_name: "{{ product.name }}"
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Success:", data);
                alert("Event tracked!");
            })
            .catch(error => {
                console.error("Error:", error);
            });
        }
    </script>
</body>
</html>
