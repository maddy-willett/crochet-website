{% extends "base.html" %}

{% block title %}{{ product.name }}{% endblock %}

{% block content %}
    <div class="card">
        <h1>{{ product.name }}</h1>
        <p><strong>Price:</strong> ${{ product.price }}</p>

        <button onclick="trackView()">Track Product View</button>
    </div>

    <br>
    <a href="/products">← Back to Products</a>

    <script>
        function trackView() {
            fetch("/track", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    event: "view_product",
                    product_id: {{ product.id }},
                    product_name: "{{ product.name }}"
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log("Tracked:", data);
                alert("Event tracked!");
            })
            .catch(error => {
                console.error("Error:", error);
            });
        }
    </script>
{% endblock %}
