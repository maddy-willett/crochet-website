{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
    <h1>Welcome to the Crochet Shop</h1>

    {% for product in products %}
        <div>
            <h3>{{ product.name }}</h3>
            <p>Price: ${{ product.price }}</p>

            <a href="/product/{{ product.id }}">
                <button>View Product</button>
            </a>
        </div>
    {% endfor %}
{% endblock %}
