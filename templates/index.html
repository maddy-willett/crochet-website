{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
    <div class="hero">
        <h1>Welcome to the Yarn Garden By Grace Gerken</h1>
        <p>Handmade crochet pieces with a cozy, playful feel.</p>
    </div>

    <h2>Featured Products</h2>

    <div class="product-grid">
        {% for product in products %}
            <div class="product-card">
                <h3>{{ product.name }}</h3>
                <p class="product-price">${{ product.price }}</p>

                <a class="button-link" href="{{ url_for('product_page', product_id=product.id) }}">
                    <button>View Product</button>
                </a>
            </div>
        {% endfor %}
    </div>
{% endblock %}
