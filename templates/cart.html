{% extends "base.html" %}

{% block title %}Cart{% endblock %}

{% block content %}
    <h1>🛒 Your Cart</h1>

    {% if cart %}
        <ul>
            {% for item in cart %}
                <li>{{ item.name }} — ${{ item.price }}</li>
            {% endfor %}
        </ul>

        <h3>Total: ${{ total }}</h3>
    {% else %}
        <p>Your cart is empty.</p>
    {% endif %}
{% endblock %}
